  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #22c55e;
      --green-dark: #16a34a;
      --red: #ef4444;
      --bg: #f0fdf4;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 2rem;
    }

    /* ── Header ── */
    header {
      background: var(--green);
      color: white;
      padding: 1.25rem 1rem 1rem;
      text-align: center;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .5px; }
    header p  { font-size: .8rem; opacity: .85; margin-top: .15rem; }

    /* ── Summary cards ── */
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
      padding: 1rem;
    }
    .summary-card {
      background: var(--card);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .summary-card .value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--green-dark);
      line-height: 1.2;
    }
    .summary-card .label {
      font-size: .75rem;
      color: var(--muted);
      margin-top: .3rem;
    }

    /* ── New sale button ── */
    .btn-new {
      display: block;
      margin: 0 1rem .25rem;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 1rem;
      font-size: 1.05rem;
      font-weight: 700;
      width: calc(100% - 2rem);
      cursor: pointer;
      letter-spacing: .3px;
      transition: background .15s;
    }
    .btn-new:active { background: var(--green-dark); }

    /* ── Modal overlay ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 1.5rem 1.25rem 2rem;
      width: 100%;
      max-width: 480px;
      animation: slideUp .22s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal h2 { font-size: 1.15rem; margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: .3rem;
    }
    input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: .75rem 1rem;
      font-size: 1rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--green); }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
      margin-top: .5rem;
    }
    .btn-cancel {
      background: var(--border);
      color: var(--text);
      border: none;
      border-radius: 10px;
      padding: .85rem;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 10px;
      padding: .85rem;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-save:active { background: var(--green-dark); }
    .btn-save:disabled { opacity: .5; cursor: default; }

    /* ── Sales list ── */
    .list-header {
      padding: 1rem 1rem .4rem;
      font-size: .8rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .sale-item {
      background: var(--card);
      margin: 0 1rem .6rem;
      border-radius: 12px;
      padding: .9rem 1rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .sale-info { flex: 1; min-width: 0; }
    .sale-name {
      font-weight: 700;
      font-size: .95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sale-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-top: .2rem;
    }
    .sale-value {
      font-weight: 700;
      color: var(--green-dark);
      font-size: 1rem;
      white-space: nowrap;
    }
    .btn-del {
      background: none;
      border: none;
      color: #d1d5db;
      font-size: 1.2rem;
      cursor: pointer;
      padding: .2rem .4rem;
      line-height: 1;
      transition: color .15s;
    }
    .btn-del:active { color: var(--red); }

    /* ── Empty / error states ── */
    .empty, .error-box {
      text-align: center;
      padding: 2.5rem 1.5rem;
      color: var(--muted);
      font-size: .9rem;
    }
    .error-box {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 12px;
      margin: 1rem;
      padding: 1rem 1.25rem;
      font-size: .85rem;
      text-align: left;
    }
    .error-box strong { display: block; margin-bottom: .3rem; }

    /* ── Loading spinner ── */
    .spinner {
      display: flex;
      justify-content: center;
      padding: 2rem;
    }
    .spinner::after {
      content: '';
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Gestão de Vouchers</h1>
  <p>R$200 de consumo cada</p>
</header>

<div class="summary">
  <div class="summary-card">
    <div class="value" id="total-vouchers">—</div>
    <div class="label">Vouchers vendidos</div>
  </div>
  <div class="summary-card">
    <div class="value" id="total-revenue">—</div>
    <div class="label">Total arrecadado</div>
  </div>
</div>

<button class="btn-new" onclick="openModal()">+ Nova Venda</button>

<div id="error-area"></div>

<div class="list-header">Vendas registradas</div>
<div id="sales-list"><div class="spinner"></div></div>

<!-- Modal nova venda -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>Nova Venda</h2>
    <label for="f-name">Nome do comprador</label>
    <input id="f-name" type="text" placeholder="Ex: João Silva" autocomplete="off" />

    <label for="f-qty">Quantidade de vouchers</label>
    <input id="f-qty" type="number" min="1" step="1" value="1" />

    <label for="f-val">Valor da venda (R$)</label>
    <input id="f-val" type="number" min="0" step="0.01" placeholder="Ex: 150,00" />

    <label for="f-phone">Telefone <span style="font-weight:400;color:#9ca3af">(opcional)</span></label>
    <input id="f-phone" type="tel" placeholder="Ex: (11) 99999-9999" autocomplete="off" />

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="saveSale()">Salvar</button>
    </div>
  </div>
</div>

<script>
  // ── Supabase init ──────────────────────────────────────────────
  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_KEY)

  // ── State ──────────────────────────────────────────────────────
  let sales = []

  // ── Init ───────────────────────────────────────────────────────
  async function init() {
    await loadSales()
    subscribeRealtime()
  }

  async function loadSales() {
    const { data, error } = await db
      .from('sales')
      .select('*')
      .order('created_at', { ascending: false })

    if (error) {
      showError(error)
      return
    }
    sales = data
    render()
  }

  function subscribeRealtime() {
    db.channel('sales-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'sales' }, () => {
        loadSales()
      })
      .subscribe()
  }

  // ── Render ─────────────────────────────────────────────────────
  function render() {
    clearError()
    const totalVouchers = sales.reduce((s, r) => s + (r.voucher_count || 0), 0)
    const totalRevenue  = sales.reduce((s, r) => s + parseFloat(r.sale_value || 0), 0)

    document.getElementById('total-vouchers').textContent = totalVouchers
    document.getElementById('total-revenue').textContent  = formatBRL(totalRevenue)

    const list = document.getElementById('sales-list')

    if (sales.length === 0) {
      list.innerHTML = '<div class="empty">Nenhuma venda registrada ainda.</div>'
      return
    }

    list.innerHTML = sales.map(s => `
      <div class="sale-item">
        <div class="sale-info">
          <div class="sale-name">${esc(s.buyer_name)}</div>
          <div class="sale-meta">${s.voucher_count} voucher${s.voucher_count !== 1 ? 's' : ''} · ${formatDate(s.created_at)}${s.phone ? ' · ' + esc(s.phone) : ''}</div>
        </div>
        <div class="sale-value">${formatBRL(s.sale_value)}</div>
        <button class="btn-del" onclick="deleteSale('${s.id}')" title="Excluir">✕</button>
      </div>
    `).join('')
  }

  // ── Modal ──────────────────────────────────────────────────────
  function openModal() {
    document.getElementById('f-name').value  = ''
    document.getElementById('f-qty').value   = '1'
    document.getElementById('f-val').value   = ''
    document.getElementById('f-phone').value = ''
    document.getElementById('overlay').classList.add('open')
    setTimeout(() => document.getElementById('f-name').focus(), 100)
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open')
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal()
  }

  // ── Save ───────────────────────────────────────────────────────
  async function saveSale() {
    const name  = document.getElementById('f-name').value.trim()
    const qty   = parseInt(document.getElementById('f-qty').value, 10)
    const val   = parseFloat(document.getElementById('f-val').value)
    const phone = document.getElementById('f-phone').value.trim() || null

    if (!name)      { alert('Informe o nome do comprador.'); return }
    if (!qty || qty < 1) { alert('Informe a quantidade de vouchers.'); return }
    if (isNaN(val) || val <= 0) { alert('Informe o valor da venda.'); return }

    const btn = document.getElementById('btn-save')
    btn.disabled = true
    btn.textContent = 'Salvando…'

    const { error } = await db.from('sales').insert({
      buyer_name:    name,
      voucher_count: qty,
      sale_value:    val,
      phone:         phone,
    })

    btn.disabled = false
    btn.textContent = 'Salvar'

    if (error) {
      showError(error)
      return
    }
    closeModal()
  }

  // ── Delete ─────────────────────────────────────────────────────
  async function deleteSale(id) {
    if (!confirm('Excluir esta venda?')) return
    const { error } = await db.from('sales').delete().eq('id', id)
    if (error) showError(error)
  }

  // ── Helpers ────────────────────────────────────────────────────
  function formatBRL(v) {
    return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
  }

  function formatDate(iso) {
    const d = new Date(iso)
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  function showError(err) {
    document.getElementById('error-area').innerHTML = `
      <div class="error-box">
        <strong>Erro de conexão</strong>
        Verifique se SUPABASE_URL e SUPABASE_KEY estão corretos no topo do arquivo.<br><br>
        <code style="font-size:.78rem">${esc(err.message)}</code>
      </div>`
  }

  function clearError() {
    document.getElementById('error-area').innerHTML = ''
  }

  // ── Start ──────────────────────────────────────────────────────
  init()
</script>
</body>
</html>
